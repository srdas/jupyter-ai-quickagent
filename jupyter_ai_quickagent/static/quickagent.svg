<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" />
  <!-- Brain/network icon representing deep agent -->
  <!-- Central node -->
  <circle cx="50" cy="42" r="6" fill="white" opacity="0.95"/>
  <!-- Top nodes -->
  <circle cx="35" cy="28" r="4" fill="white" opacity="0.8"/>
  <circle cx="65" cy="28" r="4" fill="white" opacity="0.8"/>
  <!-- Bottom nodes -->
  <circle cx="32" cy="55" r="4" fill="white" opacity="0.8"/>
  <circle cx="68" cy="55" r="4" fill="white" opacity="0.8"/>
  <!-- Sub-agent nodes (smaller) -->
  <circle cx="50" cy="68" r="3.5" fill="white" opacity="0.7"/>
  <circle cx="22" cy="42" r="3" fill="white" opacity="0.6"/>
  <circle cx="78" cy="42" r="3" fill="white" opacity="0.6"/>
  <!-- Connections -->
  <line x1="50" y1="42" x2="35" y2="28" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="42" x2="65" y2="28" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="42" x2="32" y2="55" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="42" x2="68" y2="55" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="42" x2="50" y2="68" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="42" x2="22" y2="42" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <line x1="50" y1="42" x2="78" y2="42" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <line x1="35" y1="28" x2="22" y2="42" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="65" y1="28" x2="78" y2="42" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="32" y1="55" x2="50" y2="68" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="68" y1="55" x2="50" y2="68" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="bold" opacity="0.9">DA</text>
</svg>
